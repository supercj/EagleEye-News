<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EagleEye News 设置</title>
    <link rel="stylesheet" href="./options.css">
  </head>
  <body>
    <main class="settings-page">
      <header class="page-header">
        <h1>设置</h1>
        <p>先选你关注的资源，再决定要不要导入更多订阅。</p>
      </header>

      <section class="section">
        <h2>导入订阅</h2>
        <div class="import-panel">
          <textarea id="importInput" placeholder="粘贴 OPML、RSS/Atom/JSON Feed 地址，或每行一个订阅链接"></textarea>
          <div class="import-row">
            <label class="field">
              <span>导入分类</span>
              <select id="importCategory">
                <option value="general">综合</option>
                <option value="tech">科技</option>
                <option value="dev">开发者</option>
                <option value="finance">财经</option>
              </select>
            </label>
            <label class="file-button">
              <input id="importFile" type="file" accept=".opml,.xml,.txt,.json,.rss,text/plain,text/xml,application/xml,application/json">
              <span>选择文件</span>
            </label>
            <button id="importButton">导入</button>
          </div>
          <p id="importMeta" class="meta"></p>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>来源</h2>
          <button id="selectRecommended" class="secondary-button">启用推荐源</button>
        </div>
        <div id="sourceList" class="source-list"></div>
      </section>

      <section class="section">
        <h2>刷新</h2>
        <label class="field">
          <span>自动刷新间隔</span>
          <select id="refreshSelect">
            <option value="30">30 分钟</option>
            <option value="60">60 分钟</option>
            <option value="120">2 小时</option>
            <option value="240">4 小时</option>
          </select>
        </label>
      </section>

      <footer class="footer">
        <button id="saveButton">保存设置</button>
        <span id="saveMeta"></span>
      </footer>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
