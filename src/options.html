<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EagleEye News 设置</title>
    <link rel="stylesheet" href="./options.css">
  </head>
  <body>
    <main class="settings-page">
      <header class="page-header">
        <h1>设置</h1>
        <p>先选你关注的资源，再决定要不要导入更多订阅。</p>
      </header>

      <section class="section">
        <div class="section-head">
          <h2>推荐来源</h2>
          <button id="selectRecommended" class="secondary-button">启用推荐源</button>
        </div>
        <div id="sourceList" class="source-list"></div>
      </section>

      <section class="section">
        <h2>导入订阅</h2>
        <div class="import-panel">
          <textarea id="importInput" placeholder="粘贴 OPML、RSS/Atom/JSON Feed 地址，或每行一个订阅链接"></textarea>
          <div class="import-row">
            <label class="field">
              <span>导入标签</span>
              <select id="importTag">
                <option value="general">综合</option>
                <option value="china">中文热门</option>
                <option value="tech">科技</option>
                <option value="dev">开发者</option>
                <option value="ai">AI</option>
                <option value="finance">财经</option>
              </select>
            </label>
            <label class="file-button">
              <input id="importFile" type="file" accept=".opml,.xml,.txt,.json,.rss,text/plain,text/xml,application/xml,application/json">
              <span>选择文件</span>
            </label>
            <button id="importButton">导入</button>
          </div>
          <p id="importMeta" class="meta"></p>
        </div>
      </section>

      <section class="section">
        <h2>刷新</h2>
        <label class="field">
          <span>自动刷新间隔</span>
          <select id="refreshSelect">
            <option value="1">1 分钟</option>
            <option value="5">5 分钟</option>
            <option value="10">10 分钟</option>
            <option value="30">30 分钟</option>
            <option value="60">60 分钟</option>
            <option value="120">2 小时</option>
            <option value="240">4 小时</option>
          </select>
        </label>
        <label class="setting-toggle">
          <input id="hideReadInput" type="checkbox">
          <span>隐藏已读</span>
        </label>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>关于项目</h2>
          <a class="repo-link" href="https://github.com/supercj/EagleEye-News" target="_blank" rel="noreferrer">GitHub</a>
        </div>
        <div class="about-panel">
          <div class="project-info">
            <strong>EagleEye News</strong>
            <p>开源、无服务器、数据保存在本地的 Chrome/Edge 资讯聚合扩展。</p>
            <div class="project-links">
              <a href="https://github.com/supercj/EagleEye-News" target="_blank" rel="noreferrer">开源仓库</a>
              <a href="../LICENSE" target="_blank" rel="noreferrer">MIT License</a>
              <a href="../PRIVACY.md" target="_blank" rel="noreferrer">隐私说明</a>
            </div>
          </div>
          <div class="donation-panel" aria-label="支持作者">
            <div class="donation-card">
              <div class="donation-qr">微信</div>
              <span>微信赞赏</span>
            </div>
            <div class="donation-card">
              <div class="donation-qr">支付宝</div>
              <span>支付宝打赏</span>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer">
        <span id="saveMeta" class="save-meta"></span>
      </footer>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
