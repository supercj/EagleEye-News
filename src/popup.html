<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EagleEye News</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>鹰眼资讯</h1>
          <p id="refreshMeta">准备刷新</p>
        </div>
        <div class="toolbar">
          <button id="refreshButton" class="icon-button" title="刷新">刷新</button>
          <button id="optionsButton" class="icon-button" title="设置">设置</button>
        </div>
      </header>

      <section id="onboardingPanel" class="onboarding" hidden>
        <h2>先选你关注的资源</h2>
        <p>支持 RSS、Atom、JSON Feed、OPML 导入，点击后会自动记为已读。</p>
        <div class="onboarding-actions">
          <button id="openOptionsButton" class="primary-button">去选择资源</button>
          <button id="openImportButton" class="secondary-button">导入订阅</button>
        </div>
      </section>

      <nav class="view-switch" aria-label="视图">
        <button id="latestViewButton" class="view-button active">热点</button>
        <button id="bookmarksViewButton" class="view-button">收藏</button>
      </nav>

      <section class="filters" aria-label="筛选">
        <div id="categoryTabs" class="tabs"></div>
        <label class="search">
          <span>搜</span>
          <input id="keywordInput" type="search" placeholder="搜索标题、来源或摘要">
        </label>
        <label class="toggle">
          <input id="hideReadInput" type="checkbox">
          <span>隐藏已读</span>
        </label>
      </section>

      <section id="statusPanel" class="status-panel" hidden></section>
      <section id="articleList" class="article-list" aria-live="polite"></section>
      <section id="emptyState" class="empty-state" hidden>
        <h2>暂无内容</h2>
        <p>先去选择资源，或者导入一份订阅。</p>
      </section>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
